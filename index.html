<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Linker</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --btn-color: #000000;
      --btn-text-color: #ffffff;
      --btn-radius: 0px;
      --btn-color2: #666666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }

    body { background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s ease, color 0.3s ease; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; overflow-x: hidden; padding-top: 80px; }

    h1 { font-weight: 700; font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    p.desc { font-weight: 300; opacity: 0.7; font-size: 1rem; margin-bottom: 2.5rem; word-break: keep-all; white-space: pre-wrap; }

    .container { width: 100%; max-width: 420px; padding: 0 20px; }
    .profile-section { text-align: center; margin-bottom: 2rem; }
    .profile-img-wrapper { width: 120px; height: 120px; margin: 0 auto 1.5rem; border-radius: 50%; overflow: hidden; }
    .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .profile-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: var(--text-color); color: var(--bg-color); font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; border-radius: 50%; }

    .link-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }

    .btn {
      background-color: var(--btn-color);
      color: var(--btn-text-color);
      border: none;
      padding: 16px 20px;
      cursor: pointer; font-size: 1rem; font-weight: 700;
      border-radius: var(--btn-radius);
      text-decoration: none; display: block; text-align: center;
      transition: filter 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none; position: relative; overflow: hidden;
    }
    .btn:active { transform: scale(0.98); }
    .btn.fx-invert:hover { filter: brightness(0.82); }
    .btn.gradient-on { background: linear-gradient(135deg, var(--btn-color), var(--btn-color2)); }

    @keyframes btnShimmer { 0% { left: -80%; } 100% { left: 120%; } }
    .btn.fx-shimmer::after {
      content: ''; position: absolute; top: -50%; left: -80%;
      width: 35%; height: 200%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.38), transparent);
      transform: skewX(-25deg);
      animation: btnShimmer 3s linear infinite;
      animation-delay: var(--shimmer-delay, 0s);
      pointer-events: none;
    }

    @keyframes btnPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.15); } 50% { transform: scale(1.03); box-shadow: 0 0 0 8px rgba(0,0,0,0); } }
    .btn.fx-pulse { animation: btnPulse 2s ease-in-out infinite; }
    .btn.fx-pulse:active { transform: scale(0.97); animation: none; }
    .btn.fx-float:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(0,0,0,0.22); }

    /* Loading Overlay */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: var(--bg-color);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      font-weight: 700; letter-spacing: 3px; font-size: 0.85rem;
      transition: opacity 0.3s ease;
    }

    .settings-trigger { display: none; }

    .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
    .overlay.open { opacity: 1; visibility: visible; }

    .sidebar { position: fixed; top: 0; right: 0; width: 320px; max-width: 90vw; height: 100vh; background-color: #ffffff; color: #000000; border-left: 1px solid #000; padding: 30px 24px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 1000; overflow-y: auto; }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #000; }
    .sidebar-header h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; font-weight: 300; color: #000; line-height: 1; }

    .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.5px; }
    .form-control { padding: 12px; border: 1px solid #000; border-radius: 0; font-family: inherit; font-size: 0.9rem; background: transparent; color: #000; }
    .form-control:focus { outline: 2px solid #000; outline-offset: -1px; }
    textarea.form-control { resize: vertical; }

    .color-picker-group { display: flex; align-items: center; justify-content: space-between; }
    .color-picker { width: 48px; height: 48px; padding: 0; border: 1px solid #000; cursor: pointer; background: transparent; }
    .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker::-webkit-color-swatch { border: none; }

    hr { margin: 30px 0; border: 0; border-top: 1px dashed #ccc; }

    .admin-link-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
    .admin-link-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #000; background: #fafafa; }
    .admin-link-info { flex-grow: 1; overflow: hidden; padding-right: 10px; }
    .admin-link-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-link-url { font-weight: 300; font-size: 0.75rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .delete-btn { background: #000; color: #fff; border: 1px solid #000; padding: 6px 10px; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; }
    .delete-btn:hover { background: #fff; color: #000; }

    .sidebar-btn { background: #000; color: #fff; border: 1px solid #000; padding: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; width: 100%; font-family: inherit; font-size: 0.9rem; }
    .sidebar-btn:hover:not(:disabled) { background: #fff; color: #000; }
    .sidebar-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .publish-btn { background: #000; color: #fff; border: none; padding: 16px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; width: 100%; font-family: inherit; font-size: 1rem; letter-spacing: 1px; margin-bottom: 8px; }
    .publish-btn:hover:not(:disabled) { background: #333; }
    .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .reset-btn { background: transparent; color: #000; border: 1px solid #000; padding: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; width: 100%; font-family: inherit; font-size: 0.9rem; }
    .reset-btn:hover { background: #000; color: #fff; }

    .hint { font-size: 0.72rem; color: #888; line-height: 1.5; }

    .style-options { display: flex; gap: 6px; }
    .style-opt { flex: 1; padding: 10px 4px; border: 1px solid #000; background: #fff; cursor: pointer; font-size: 0.78rem; font-weight: 700; font-family: inherit; transition: all 0.15s; text-align: center; }
    .style-opt:hover:not(.active) { background: #f0f0f0; }
    .style-opt.active { background: #000; color: #fff; }

    .upload-box { border: 1px dashed #000; padding: 20px; text-align: center; cursor: pointer; position: relative; transition: background 0.2s; }
    .upload-box:hover { background: #f5f5f5; }
    .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-box-label { font-size: 0.85rem; font-weight: 700; pointer-events: none; }

    .upload-status { font-size: 0.78rem; font-weight: 700; margin-top: 4px; min-height: 18px; }
    .upload-status.success { color: #008000; }
    .upload-status.error { color: #cc0000; }
    .upload-status.loading { color: #888; }

    .img-preview { width: 60px; height: 60px; object-fit: cover; border: 1px solid #000; display: none; }
    .img-preview.visible { display: block; }

    .collapsible { border: 1px solid #ddd; padding: 12px; background: #fafafa; }
    .collapsible summary { font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
    .collapsible .inner { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }

    .publish-status { font-size: 0.8rem; font-weight: 700; text-align: center; min-height: 20px; margin-bottom: 8px; }
    .publish-status.success { color: #008000; }
    .publish-status.error { color: #cc0000; }
    .publish-status.loading { color: #888; }

    .copy-url-btn { background: transparent; color: #000; border: 1px solid #000; padding: 10px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; width: 100%; font-family: inherit; font-size: 0.85rem; margin-bottom: 12px; }
    .copy-url-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>

  <div id="loadingOverlay">LOADING...</div>
  <div class="overlay" id="overlay"></div>
  <button class="settings-trigger" id="openSettingsBtn">[ SETTINGS ]</button>

  <div class="container">
    <div class="profile-section">
      <div class="profile-img-wrapper">
        <img src="" id="mainProfileImg" class="profile-img" alt="Profile Image">
        <div id="mainProfileImgPlaceholder" class="profile-img-placeholder">NO IMG</div>
      </div>
      <h1 id="mainName">YOUR NAME</h1>
      <p class="desc" id="mainDesc">A short description about yourself.</p>
    </div>
    <div class="link-list" id="mainLinkList"></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>SETTINGS</h2>
      <button class="close-btn" id="closeSettingsBtn">&times;</button>
    </div>

    <!-- 프로필 이미지 -->
    <div class="form-group">
      <label>프로필 이미지</label>
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:4px;">
        <img id="imgPreview" class="img-preview" alt="preview">
        <div class="upload-box" style="flex:1;">
          <input type="file" id="imgFileInput" accept="image/*">
          <div class="upload-box-label" id="uploadBoxLabel">파일 선택</div>
        </div>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
      <details class="collapsible" id="apiKeyDetails">
        <summary>ImgBB API 키 설정 (1회)</summary>
        <div class="inner">
          <span class="hint">1. <strong>imgbb.com</strong> 무료 가입<br>2. <strong>api.imgbb.com</strong>에서 키 발급<br>3. 아래 입력 후 저장</span>
          <input type="text" id="imgbbKeyInput" class="form-control" placeholder="API 키 붙여넣기">
          <button type="button" class="sidebar-btn" id="saveImgbbKeyBtn">API 키 저장</button>
        </div>
      </details>
    </div>

    <div class="form-group">
      <label for="nameInput">NAME</label>
      <input type="text" id="nameInput" class="form-control" placeholder="YOUR NAME">
    </div>
    <div class="form-group">
      <label for="descInput">DESCRIPTION</label>
      <textarea id="descInput" class="form-control" rows="3" placeholder="A short description about yourself."></textarea>
    </div>

    <hr>

    <div class="form-group color-picker-group">
      <label>배경 색상</label>
      <input type="color" id="bgColorPicker" class="color-picker" value="#ffffff">
    </div>
    <div class="form-group color-picker-group">
      <label>버튼 색상</label>
      <input type="color" id="btnColorPicker" class="color-picker" value="#000000">
    </div>

    <hr>

    <div class="form-group">
      <label>버튼 모양</label>
      <div class="style-options" id="radiusOptions">
        <button type="button" class="style-opt active" data-value="0">각진</button>
        <button type="button" class="style-opt" data-value="8">둥근</button>
        <button type="button" class="style-opt" data-value="999">알약</button>
      </div>
    </div>
    <div class="form-group">
      <label>버튼 효과</label>
      <div class="style-options" id="effectOptions">
        <button type="button" class="style-opt active" data-value="invert">기본</button>
        <button type="button" class="style-opt" data-value="shimmer">반짝임</button>
        <button type="button" class="style-opt" data-value="pulse">맥박</button>
        <button type="button" class="style-opt" data-value="float">떠오르기</button>
      </div>
    </div>
    <div class="form-group">
      <label>그라데이션</label>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="gradientToggle" style="width:16px; height:16px; cursor:pointer;">
        <span style="font-size:0.85rem;">그라데이션 사용</span>
      </div>
      <div id="gradientColorRow" class="color-picker-group" style="display:none; margin-top:4px;">
        <label>끝 색상</label>
        <input type="color" id="btnColor2Picker" class="color-picker" value="#666666">
      </div>
    </div>

    <hr>

    <div class="form-group">
      <label>ADD NEW LINK</label>
      <input type="text" id="newLinkTitle" class="form-control" placeholder="TITLE">
      <input type="url" id="newLinkUrl" class="form-control" placeholder="URL (e.g., https://...)">
      <button type="button" class="sidebar-btn" id="addLinkBtn" style="margin-top:4px;">ADD LINK</button>
    </div>
    <div class="admin-link-list" id="adminLinkList"></div>

    <hr>

    <div class="form-group">
      <label for="pwInput">설정 비밀번호 변경</label>
      <input type="password" id="pwInput" class="form-control" placeholder="새 비밀번호 입력">
      <button type="button" class="sidebar-btn" id="savePwBtn" style="margin-top:4px;">비밀번호 변경</button>
      <span class="hint">비밀번호를 변경하지 않은 경우 초기값을 사용하세요.</span>
    </div>

    <!-- GitHub 토큰 -->
    <details class="collapsible" id="ghTokenDetails">
      <summary>GitHub 토큰 설정 (1회)</summary>
      <div class="inner">
        <span class="hint">repo 권한이 있는 GitHub PAT를 입력하세요.<br>저장하기 버튼을 사용하는 데 필요합니다.</span>
        <input type="password" id="ghTokenInput" class="form-control" placeholder="ghp_...">
        <button type="button" class="sidebar-btn" id="saveGhTokenBtn">토큰 저장</button>
      </div>
    </details>

    <hr>

    <!-- 저장 및 공유 -->
    <div class="publish-status" id="publishStatus"></div>
    <button type="button" class="publish-btn" id="publishBtn">저장하기</button>
    <button type="button" class="copy-url-btn" id="copyLinkBtn">내 링크 복사</button>
    <button type="button" class="reset-btn" id="resetBtn">RESET TO DEFAULT</button>
  </div>

  <script>
    // ===== Config =====
    const GH_OWNER = 'lith0223-cell';
    const GH_REPO  = 'links';
    const GH_FILE  = 'data.json';
    const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
    const GH_RAW   = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;

    // ===== Keys =====
    const DATA_KEY    = 'localLinkerData';
    const PW_KEY      = 'llPwHash';
    const IMGBB_KEY   = 'llImgBBKey';
    const GH_TOKEN_KEY = 'llGHToken';
    const DEFAULT_PW_HASH = hashStr('0223');

    // ===== Utilities =====
    function hashStr(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return (h >>> 0).toString(36);
    }

    const getContrastYIQ = (hex) => {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
      return ((r*299 + g*587 + b*114) / 1000 >= 128) ? '#000000' : '#ffffff';
    };

    const fileToBase64 = (file) => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const toB64 = (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/gi, (_, p) => String.fromCharCode(parseInt(p,16))));

    const SHIMMER_DURATION = 3;
    const getShimmerDelay = () => `-${((performance.now() / 1000) % SHIMMER_DURATION).toFixed(3)}s`;

    // ===== Default State =====
    const defaultState = {
      profile_image_url: '',
      name: 'YOUR NAME',
      desc: 'A short description about yourself.',
      bg_color: '#ffffff',
      btn_color: '#000000',
      btn_radius: 0,
      btn_effect: 'invert',
      btn_gradient: false,
      btn_color2: '#666666',
      links: [
        { id: '1', title: 'GITHUB', url: 'https://github.com' },
        { id: '2', title: 'PORTFOLIO', url: '#' }
      ]
    };

    let state = { ...defaultState };

    // ===== GitHub API =====
    const fetchProfileData = async () => {
      const res = await fetch(GH_RAW + '?_=' + Date.now());
      if (!res.ok) throw new Error('FETCH_FAILED');
      return res.json();
    };

    const publishToGitHub = async (data) => {
      const token = localStorage.getItem(GH_TOKEN_KEY);
      if (!token) throw new Error('NO_TOKEN');

      const headers = {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      };

      const metaRes = await fetch(GH_API, { headers });
      if (metaRes.status === 401) throw new Error('INVALID_TOKEN');
      if (!metaRes.ok) throw new Error('API_ERROR');
      const { sha } = await metaRes.json();

      const content = toB64(JSON.stringify(data, null, 2));
      const putRes = await fetch(GH_API, {
        method: 'PUT',
        headers,
        body: JSON.stringify({ message: 'Update profile', content, sha })
      });
      if (putRes.status === 401) throw new Error('INVALID_TOKEN');
      if (!putRes.ok) throw new Error('PUT_FAILED');
    };

    // ===== ImgBB =====
    const uploadToImgBB = async (file) => {
      const apiKey = localStorage.getItem(IMGBB_KEY);
      if (!apiKey) throw new Error('NO_KEY');
      const base64 = await fileToBase64(file);
      const formData = new FormData();
      formData.append('key', apiKey);
      formData.append('image', base64.split(',')[1]);
      const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('UPLOAD_FAILED');
      const json = await res.json();
      if (json.success) return json.data.url;
      throw new Error('UPLOAD_FAILED');
    };

    // ===== Password =====
    const getPwHash = () => localStorage.getItem(PW_KEY) || DEFAULT_PW_HASH;

    const verifyAndOpenSettings = () => {
      const input = prompt('비밀번호를 입력하세요:');
      if (input === null) return;
      if (hashStr(input) === getPwHash()) {
        if (getPwHash() === DEFAULT_PW_HASH) {
          alert('보안을 위해 설정에서 비밀번호를 변경해주세요.');
        }
        UI.sidebar.classList.add('open');
        UI.overlay.classList.add('open');
      } else {
        alert('비밀번호가 틀렸습니다.');
      }
    };

    const refreshSettingsBtn = () => {}; // 버튼 완전 히든, 프로필 3번 클릭으로만 접근

    // 프로필 이미지 3번 클릭 → 설정 접근 (새 기기용 히든 접근)
    let profileClicks = 0, profileTimer = null;
    const handleProfileClick = () => {
      profileClicks++;
      clearTimeout(profileTimer);
      profileTimer = setTimeout(() => { profileClicks = 0; }, 700);
      if (profileClicks >= 3) { profileClicks = 0; verifyAndOpenSettings(); }
    };

    // ===== DOM =====
    const UI = {
      root: document.documentElement,
      loadingOverlay: document.getElementById('loadingOverlay'),
      openBtn: document.getElementById('openSettingsBtn'),
      closeBtn: document.getElementById('closeSettingsBtn'),
      sidebar: document.getElementById('sidebar'),
      overlay: document.getElementById('overlay'),
      mainImg: document.getElementById('mainProfileImg'),
      mainPlaceholder: document.getElementById('mainProfileImgPlaceholder'),
      mainName: document.getElementById('mainName'),
      mainDesc: document.getElementById('mainDesc'),
      mainLinkList: document.getElementById('mainLinkList'),
      imgFileInput: document.getElementById('imgFileInput'),
      imgPreview: document.getElementById('imgPreview'),
      uploadBoxLabel: document.getElementById('uploadBoxLabel'),
      uploadStatus: document.getElementById('uploadStatus'),
      imgbbKeyInput: document.getElementById('imgbbKeyInput'),
      saveImgbbKeyBtn: document.getElementById('saveImgbbKeyBtn'),
      apiKeyDetails: document.getElementById('apiKeyDetails'),
      nameInput: document.getElementById('nameInput'),
      descInput: document.getElementById('descInput'),
      bgColorPicker: document.getElementById('bgColorPicker'),
      btnColorPicker: document.getElementById('btnColorPicker'),
      radiusOptions: document.getElementById('radiusOptions'),
      effectOptions: document.getElementById('effectOptions'),
      gradientToggle: document.getElementById('gradientToggle'),
      gradientColorRow: document.getElementById('gradientColorRow'),
      btnColor2Picker: document.getElementById('btnColor2Picker'),
      newLinkTitle: document.getElementById('newLinkTitle'),
      newLinkUrl: document.getElementById('newLinkUrl'),
      addLinkBtn: document.getElementById('addLinkBtn'),
      adminLinkList: document.getElementById('adminLinkList'),
      pwInput: document.getElementById('pwInput'),
      savePwBtn: document.getElementById('savePwBtn'),
      ghTokenInput: document.getElementById('ghTokenInput'),
      saveGhTokenBtn: document.getElementById('saveGhTokenBtn'),
      ghTokenDetails: document.getElementById('ghTokenDetails'),
      publishBtn: document.getElementById('publishBtn'),
      publishStatus: document.getElementById('publishStatus'),
      copyLinkBtn: document.getElementById('copyLinkBtn'),
      resetBtn: document.getElementById('resetBtn')
    };

    // ===== Persistence (local only) =====
    const saveLocal = () => localStorage.setItem(DATA_KEY, JSON.stringify(state));

    // ===== Render =====
    const setUploadStatus = (msg, type) => {
      UI.uploadStatus.textContent = msg;
      UI.uploadStatus.className = 'upload-status' + (type ? ' ' + type : '');
    };

    const setPublishStatus = (msg, type) => {
      UI.publishStatus.textContent = msg;
      UI.publishStatus.className = 'publish-status' + (type ? ' ' + type : '');
    };

    const syncStyleOptions = (container, val) => {
      container.querySelectorAll('.style-opt').forEach(b => {
        b.classList.toggle('active', b.dataset.value === String(val));
      });
    };

    const renderColors = () => {
      UI.root.style.setProperty('--bg-color', state.bg_color);
      UI.root.style.setProperty('--text-color', getContrastYIQ(state.bg_color));
      UI.root.style.setProperty('--btn-color', state.btn_color);
      UI.root.style.setProperty('--btn-text-color', getContrastYIQ(state.btn_color));
      UI.root.style.setProperty('--btn-radius', state.btn_radius + 'px');
      UI.root.style.setProperty('--btn-color2', state.btn_color2 || '#666666');
      UI.bgColorPicker.value = state.bg_color;
      UI.btnColorPicker.value = state.btn_color;
      UI.btnColor2Picker.value = state.btn_color2 || '#666666';
      UI.gradientToggle.checked = !!state.btn_gradient;
      UI.gradientColorRow.style.display = state.btn_gradient ? 'flex' : 'none';
    };

    const renderProfile = () => {
      if (state.profile_image_url) {
        UI.mainImg.src = state.profile_image_url;
        UI.mainImg.style.display = 'block';
        UI.mainPlaceholder.style.display = 'none';
        UI.imgPreview.src = state.profile_image_url;
        UI.imgPreview.classList.add('visible');
        setUploadStatus('이미지 설정됨', 'success');
      } else {
        UI.mainImg.style.display = 'none';
        UI.mainPlaceholder.style.display = 'flex';
        UI.imgPreview.classList.remove('visible');
      }
      UI.mainName.textContent = state.name;
      UI.mainDesc.textContent = state.desc;
      UI.nameInput.value = state.name;
      UI.descInput.value = state.desc;
      const savedKey = localStorage.getItem(IMGBB_KEY);
      UI.imgbbKeyInput.value = savedKey || '';
      if (savedKey) UI.apiKeyDetails.removeAttribute('open');
      else UI.apiKeyDetails.setAttribute('open', '');
      const savedToken = localStorage.getItem(GH_TOKEN_KEY);
      if (savedToken) UI.ghTokenDetails.removeAttribute('open');
    };

    const renderLinks = () => {
      UI.mainLinkList.innerHTML = '';
      state.links.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.className = 'btn fx-' + (state.btn_effect || 'invert');
        if (state.btn_gradient) a.classList.add('gradient-on');
        if (state.btn_effect === 'shimmer') a.style.setProperty('--shimmer-delay', getShimmerDelay());
        a.textContent = link.title;
        a.dataset.id = link.id;
        UI.mainLinkList.appendChild(a);
      });

      UI.adminLinkList.innerHTML = '';
      state.links.forEach(link => {
        const item = document.createElement('div');
        item.className = 'admin-link-item';
        const info = document.createElement('div');
        info.className = 'admin-link-info';
        const titleDiv = document.createElement('div');
        titleDiv.className = 'admin-link-title';
        titleDiv.textContent = link.title;
        const urlDiv = document.createElement('div');
        urlDiv.className = 'admin-link-url';
        urlDiv.textContent = link.url;
        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'delete-btn';
        delBtn.dataset.id = link.id;
        delBtn.textContent = 'DEL';
        info.appendChild(titleDiv);
        info.appendChild(urlDiv);
        item.appendChild(info);
        item.appendChild(delBtn);
        UI.adminLinkList.appendChild(item);
      });

      syncStyleOptions(UI.radiusOptions, state.btn_radius);
      syncStyleOptions(UI.effectOptions, state.btn_effect || 'invert');
    };

    const renderAll = () => { renderColors(); renderProfile(); renderLinks(); };

    // ===== Events =====
    const toggleSidebar = (close = false) => {
      const isOpen = UI.sidebar.classList.contains('open');
      if (close || isOpen) { UI.sidebar.classList.remove('open'); UI.overlay.classList.remove('open'); }
      else { UI.sidebar.classList.add('open'); UI.overlay.classList.add('open'); }
    };

    UI.openBtn.addEventListener('click', verifyAndOpenSettings);
    UI.closeBtn.addEventListener('click', () => toggleSidebar(true));
    UI.overlay.addEventListener('click', () => toggleSidebar(true));
    UI.mainImg.addEventListener('click', handleProfileClick);
    UI.mainPlaceholder.addEventListener('click', handleProfileClick);

    UI.imgFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!localStorage.getItem(IMGBB_KEY)) { UI.apiKeyDetails.setAttribute('open',''); setUploadStatus('먼저 ImgBB API 키를 저장하세요.', 'error'); return; }
      UI.uploadBoxLabel.textContent = file.name;
      setUploadStatus('업로드 중...', 'loading');
      try {
        const url = await uploadToImgBB(file);
        state.profile_image_url = url;
        renderProfile();
        saveLocal();
        setUploadStatus('업로드 완료!', 'success');
      } catch { setUploadStatus('업로드 실패. API 키를 확인하세요.', 'error'); }
    });

    UI.saveImgbbKeyBtn.addEventListener('click', () => {
      const key = UI.imgbbKeyInput.value.trim();
      if (!key) { alert('API 키를 입력하세요.'); return; }
      localStorage.setItem(IMGBB_KEY, key);
      UI.apiKeyDetails.removeAttribute('open');
      setUploadStatus('API 키 저장 완료.', 'success');
    });

    UI.nameInput.addEventListener('input', (e) => { state.name = e.target.value; UI.mainName.textContent = state.name || ' '; saveLocal(); });
    UI.descInput.addEventListener('input', (e) => { state.desc = e.target.value; UI.mainDesc.textContent = state.desc || ' '; saveLocal(); });
    UI.bgColorPicker.addEventListener('input', (e) => { state.bg_color = e.target.value; renderColors(); saveLocal(); });
    UI.btnColorPicker.addEventListener('input', (e) => { state.btn_color = e.target.value; renderColors(); saveLocal(); });

    UI.radiusOptions.addEventListener('click', (e) => {
      const btn = e.target.closest('.style-opt');
      if (!btn) return;
      state.btn_radius = Number(btn.dataset.value);
      UI.root.style.setProperty('--btn-radius', state.btn_radius + 'px');
      syncStyleOptions(UI.radiusOptions, state.btn_radius);
      saveLocal();
    });

    UI.effectOptions.addEventListener('click', (e) => {
      const btn = e.target.closest('.style-opt');
      if (!btn) return;
      state.btn_effect = btn.dataset.value;
      syncStyleOptions(UI.effectOptions, state.btn_effect);
      renderLinks();
      saveLocal();
    });

    UI.gradientToggle.addEventListener('change', (e) => {
      state.btn_gradient = e.target.checked;
      UI.gradientColorRow.style.display = state.btn_gradient ? 'flex' : 'none';
      renderLinks();
      saveLocal();
    });

    UI.btnColor2Picker.addEventListener('input', (e) => {
      state.btn_color2 = e.target.value;
      UI.root.style.setProperty('--btn-color2', state.btn_color2);
      saveLocal();
    });

    UI.adminLinkList.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) deleteLink(btn.dataset.id);
    });

    UI.addLinkBtn.addEventListener('click', () => {
      const title = UI.newLinkTitle.value.trim();
      let url = UI.newLinkUrl.value.trim();
      if (!title || !url) { alert('제목과 URL을 모두 입력해주세요.'); return; }
      if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
      state.links.push({ id: Date.now().toString(), title, url });
      saveLocal(); renderLinks();
      UI.newLinkTitle.value = '';
      UI.newLinkUrl.value = '';
    });

    const deleteLink = (id) => {
      state.links = state.links.filter(l => String(l.id) !== String(id));
      saveLocal(); renderLinks();
    };

    UI.savePwBtn.addEventListener('click', () => {
      const pw = UI.pwInput.value.trim();
      if (!pw) return;
      localStorage.setItem(PW_KEY, hashStr(pw));
      UI.pwInput.value = '';
      alert('비밀번호가 변경되었습니다.');
    });

    UI.saveGhTokenBtn.addEventListener('click', () => {
      const token = UI.ghTokenInput.value.trim();
      if (!token) { alert('토큰을 입력하세요.'); return; }
      localStorage.setItem(GH_TOKEN_KEY, token);
      UI.ghTokenInput.value = '';
      UI.ghTokenDetails.removeAttribute('open');
      setPublishStatus('토큰 저장 완료.', 'success');
      refreshSettingsBtn();
    });

    // 저장하기 (GitHub 배포)
    UI.publishBtn.addEventListener('click', async () => {
      if (!localStorage.getItem(GH_TOKEN_KEY)) {
        UI.ghTokenDetails.setAttribute('open', '');
        setPublishStatus('GitHub 토큰을 먼저 저장하세요.', 'error');
        return;
      }
      UI.publishBtn.textContent = '저장 중...';
      UI.publishBtn.disabled = true;
      setPublishStatus('GitHub에 업로드 중...', 'loading');
      try {
        await publishToGitHub(state);
        setPublishStatus('저장 완료! 방문자에게 바로 반영됩니다.', 'success');
      } catch(err) {
        const msg = err.message === 'NO_TOKEN' ? 'GitHub 토큰을 저장하세요.' :
                    err.message === 'INVALID_TOKEN' ? '토큰이 유효하지 않습니다.' : '저장 실패. 토큰을 확인하세요.';
        setPublishStatus(msg, 'error');
      }
      UI.publishBtn.textContent = '저장하기';
      UI.publishBtn.disabled = false;
    });

    // 내 링크 복사 (짧은 URL)
    UI.copyLinkBtn.addEventListener('click', () => {
      const url = location.origin + location.pathname;
      const fallback = () => { const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); };
      (navigator.clipboard ? navigator.clipboard.writeText(url).catch(fallback) : Promise.resolve(fallback()))
        .then(() => { UI.copyLinkBtn.textContent = '복사 완료!'; setTimeout(() => { UI.copyLinkBtn.textContent = '내 링크 복사'; }, 2000); });
    });

    UI.resetBtn.addEventListener('click', () => {
      if (confirm('모든 설정이 초기화됩니다. 정말 진행하시겠습니까?')) {
        localStorage.removeItem(DATA_KEY);
        state = JSON.parse(JSON.stringify(defaultState));
        renderAll();
      }
    });

    // ===== SortableJS =====
    new Sortable(UI.mainLinkList, {
      animation: 150, delay: 100, delayOnTouchOnly: true,
      ghostClass: 'sortable-ghost',
      onEnd() {
        const items = UI.mainLinkList.querySelectorAll('a.btn');
        const arr = [];
        items.forEach(item => { const d = state.links.find(l => l.id === item.dataset.id); if (d) arr.push(d); });
        state.links = arr;
        saveLocal(); renderLinks();
      }
    });

    // ===== Init: GitHub에서 데이터 로드 =====
    (async () => {
      try {
        // localStorage 캐시로 먼저 빠르게 표시
        const cached = localStorage.getItem(DATA_KEY);
        if (cached) {
          const parsed = JSON.parse(cached);
          state = { ...defaultState, ...parsed };
          if (!Array.isArray(state.links)) state.links = [...defaultState.links];
          renderAll();
        }
        // GitHub에서 최신 데이터 가져오기
        const ghData = await fetchProfileData();
        state = { ...defaultState, ...ghData };
        if (!Array.isArray(state.links)) state.links = [...defaultState.links];
        saveLocal();
        renderAll();
      } catch(e) {
        // GitHub 실패 시 localStorage 또는 기본값으로 폴백
        if (!localStorage.getItem(DATA_KEY)) renderAll();
      } finally {
        UI.loadingOverlay.style.opacity = '0';
        setTimeout(() => { UI.loadingOverlay.style.display = 'none'; }, 300);
        refreshSettingsBtn();
      }
    })();
  </script>
</body>
</html>
