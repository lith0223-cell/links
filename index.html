<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Linker</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --btn-color: #000000;
      --btn-text-color: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
      padding-top: 80px;
    }

    h1 {
      font-weight: 700;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p.desc {
      font-weight: 300;
      opacity: 0.7;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      word-break: keep-all;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
      position: relative;
    }

    .profile-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .profile-img-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      position: relative;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
      display: none;
    }

    .profile-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--text-color);
      color: var(--bg-color);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 60px;
    }

    .btn {
      background-color: var(--btn-color);
      color: var(--btn-text-color);
      border: 1px solid var(--btn-color);
      padding: 16px 20px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 0;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: filter 0.2s ease, transform 0.1s ease;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .invert-hover:hover {
      filter: invert(100%);
    }

    .settings-trigger {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-color);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1.5px;
      z-index: 100;
      transition: opacity 0.2s;
    }

    .settings-trigger:hover {
      opacity: 0.5;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      max-width: 90vw;
      height: 100vh;
      background-color: #ffffff;
      color: #000000;
      border-left: 1px solid #000000;
      padding: 30px 24px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 1000;
      overflow-y: auto;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #000;
    }

    .sidebar-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      font-weight: 300;
      color: #000;
      line-height: 1;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .form-control {
      padding: 12px;
      border: 1px solid #000;
      border-radius: 0;
      font-family: inherit;
      font-size: 0.9rem;
      background: transparent;
      color: #000;
      transition: outline 0.2s;
    }

    .form-control:focus {
      outline: 2px solid #000;
      outline-offset: -1px;
    }

    textarea.form-control {
      resize: vertical;
    }

    .color-picker-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .color-picker {
      width: 48px;
      height: 48px;
      padding: 0;
      border: 1px solid #000;
      cursor: pointer;
      background: transparent;
    }

    .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker::-webkit-color-swatch { border: none; }

    hr {
      margin: 30px 0;
      border: 0;
      border-top: 1px dashed #ccc;
    }

    .admin-link-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .admin-link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border: 1px solid #000;
      background: #fafafa;
    }

    .admin-link-info {
      flex-grow: 1;
      overflow: hidden;
      padding-right: 10px;
    }

    .admin-link-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-link-url {
      font-weight: 300;
      font-size: 0.75rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-btn {
      background: #000;
      color: #fff;
      border: 1px solid #000;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 700;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #fff;
      color: #000;
    }

    .sidebar-btn {
      background: #000;
      color: #fff;
      border: 1px solid #000;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      width: 100%;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .sidebar-btn:hover {
      background: #fff;
      color: #000;
    }

    .reset-btn {
      background: transparent;
      color: #000;
      border: 1px solid #000;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      width: 100%;
      font-family: inherit;
      font-size: 0.9rem;
    }

    .reset-btn:hover {
      background: #000;
      color: #fff;
    }

    .hint {
      font-size: 0.72rem;
      color: #888;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>
  <button class="settings-trigger" id="openSettingsBtn">[ SETTINGS ]</button>

  <div class="container">
    <div class="profile-section">
      <div class="profile-img-wrapper">
        <img src="" id="mainProfileImg" class="profile-img" alt="Profile Image">
        <div id="mainProfileImgPlaceholder" class="profile-img-placeholder">NO IMG</div>
      </div>
      <h1 id="mainName">YOUR NAME</h1>
      <p class="desc" id="mainDesc">A short description about yourself.</p>
    </div>

    <div class="link-list" id="mainLinkList"></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>SETTINGS</h2>
      <button class="close-btn" id="closeSettingsBtn">&times;</button>
    </div>

    <div class="form-group">
      <label for="imgUrlInput">프로필 이미지 URL</label>
      <input type="url" id="imgUrlInput" class="form-control" placeholder="https://...이미지 주소">
      <span class="hint">imgur, GitHub 등에 업로드한 이미지 URL을 입력하세요.</span>
    </div>

    <div class="form-group">
      <label for="nameInput">NAME</label>
      <input type="text" id="nameInput" class="form-control" placeholder="YOUR NAME">
    </div>

    <div class="form-group">
      <label for="descInput">DESCRIPTION</label>
      <textarea id="descInput" class="form-control" rows="3" placeholder="A short description about yourself."></textarea>
    </div>

    <hr>

    <div class="form-group color-picker-group">
      <label for="bgColorPicker">BACKGROUND COLOR</label>
      <input type="color" id="bgColorPicker" class="color-picker" value="#ffffff">
    </div>
    <div class="form-group color-picker-group">
      <label for="btnColorPicker">BUTTON COLOR</label>
      <input type="color" id="btnColorPicker" class="color-picker" value="#000000">
    </div>

    <hr>

    <div class="form-group">
      <label>ADD NEW LINK</label>
      <input type="text" id="newLinkTitle" class="form-control" placeholder="TITLE">
      <input type="url" id="newLinkUrl" class="form-control" placeholder="URL (e.g., https://...)">
      <button type="button" class="sidebar-btn" id="addLinkBtn" style="margin-top: 4px;">ADD LINK</button>
    </div>

    <div class="admin-link-list" id="adminLinkList"></div>

    <hr>

    <div class="form-group">
      <label for="pwInput">설정 비밀번호 변경</label>
      <input type="password" id="pwInput" class="form-control" placeholder="새 비밀번호 입력">
      <button type="button" class="sidebar-btn" id="savePwBtn" style="margin-top: 4px;">비밀번호 변경</button>
      <span class="hint">초기 비밀번호: 0000</span>
    </div>

    <hr>

    <button type="button" class="sidebar-btn" id="copyLinkBtn" style="margin-bottom: 12px;">내 링크 복사</button>
    <button type="button" class="reset-btn" id="resetBtn">RESET TO DEFAULT</button>
  </div>

  <script>
    // ===== Utilities =====

    const hashStr = (str) => {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
      return (h >>> 0).toString(36);
    };

    const encodeState = (s) => {
      try {
        const json = JSON.stringify(s);
        return btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/gi,
          (_, p1) => String.fromCharCode(parseInt(p1, 16))));
      } catch(e) { return ''; }
    };

    const decodeState = (b64) => {
      try {
        return JSON.parse(decodeURIComponent(
          Array.from(atob(b64), c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('')
        ));
      } catch(e) { return null; }
    };

    const getContrastYIQ = (hexcolor) => {
      hexcolor = hexcolor.replace('#', '');
      if (hexcolor.length === 3) hexcolor = hexcolor.split('').map(c => c + c).join('');
      const r = parseInt(hexcolor.substr(0, 2), 16);
      const g = parseInt(hexcolor.substr(2, 2), 16);
      const b = parseInt(hexcolor.substr(4, 2), 16);
      return ((r * 299 + g * 587 + b * 114) / 1000 >= 128) ? '#000000' : '#ffffff';
    };

    // ===== Constants =====

    const DATA_KEY = 'localLinkerData';
    const PW_KEY = 'llPwHash';
    const DEFAULT_PW_HASH = hashStr('0000');

    // ===== Default State =====

    const defaultState = {
      profile_image_url: '',
      name: 'YOUR NAME',
      desc: 'A short description about yourself.',
      bg_color: '#ffffff',
      btn_color: '#000000',
      links: [
        { id: '1', title: 'GITHUB', url: 'https://github.com' },
        { id: '2', title: 'PORTFOLIO', url: '#' }
      ]
    };

    // ===== State Loading (URL Hash → localStorage → default) =====

    let state;
    const rawHash = location.hash.slice(1);
    const hashData = rawHash ? decodeState(rawHash) : null;

    if (hashData && hashData.name !== undefined) {
      state = { ...defaultState, ...hashData };
      if (!Array.isArray(state.links)) state.links = [...defaultState.links];
    } else {
      state = { ...defaultState };
      try {
        const saved = localStorage.getItem(DATA_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...defaultState, ...parsed };
          if (!Array.isArray(state.links)) state.links = [...defaultState.links];
        }
      } catch(e) {}
    }

    // ===== Persistence =====

    const saveState = () => {
      localStorage.setItem(DATA_KEY, JSON.stringify(state));
      const encoded = encodeState(state);
      if (encoded) history.replaceState(null, '', location.pathname + '#' + encoded);
    };

    // ===== Password =====

    const getPwHash = () => localStorage.getItem(PW_KEY) || DEFAULT_PW_HASH;

    const verifyAndOpenSettings = () => {
      const input = prompt('비밀번호를 입력하세요:\n(초기 비밀번호: 0000)');
      if (input === null) return;
      if (hashStr(input) === getPwHash()) {
        UI.sidebar.classList.add('open');
        UI.overlay.classList.add('open');
      } else {
        alert('비밀번호가 틀렸습니다.');
      }
    };

    // ===== DOM =====

    const UI = {
      root: document.documentElement,
      openBtn: document.getElementById('openSettingsBtn'),
      closeBtn: document.getElementById('closeSettingsBtn'),
      sidebar: document.getElementById('sidebar'),
      overlay: document.getElementById('overlay'),
      mainImg: document.getElementById('mainProfileImg'),
      mainPlaceholder: document.getElementById('mainProfileImgPlaceholder'),
      mainName: document.getElementById('mainName'),
      mainDesc: document.getElementById('mainDesc'),
      mainLinkList: document.getElementById('mainLinkList'),
      imgUrlInput: document.getElementById('imgUrlInput'),
      nameInput: document.getElementById('nameInput'),
      descInput: document.getElementById('descInput'),
      bgColorPicker: document.getElementById('bgColorPicker'),
      btnColorPicker: document.getElementById('btnColorPicker'),
      newLinkTitle: document.getElementById('newLinkTitle'),
      newLinkUrl: document.getElementById('newLinkUrl'),
      addLinkBtn: document.getElementById('addLinkBtn'),
      adminLinkList: document.getElementById('adminLinkList'),
      pwInput: document.getElementById('pwInput'),
      savePwBtn: document.getElementById('savePwBtn'),
      copyLinkBtn: document.getElementById('copyLinkBtn'),
      resetBtn: document.getElementById('resetBtn')
    };

    // ===== Render =====

    const renderColors = () => {
      UI.root.style.setProperty('--bg-color', state.bg_color);
      UI.root.style.setProperty('--text-color', getContrastYIQ(state.bg_color));
      UI.root.style.setProperty('--btn-color', state.btn_color);
      UI.root.style.setProperty('--btn-text-color', getContrastYIQ(state.btn_color));
      UI.bgColorPicker.value = state.bg_color;
      UI.btnColorPicker.value = state.btn_color;
    };

    const renderProfile = () => {
      if (state.profile_image_url) {
        UI.mainImg.src = state.profile_image_url;
        UI.mainImg.style.display = 'block';
        UI.mainPlaceholder.style.display = 'none';
      } else {
        UI.mainImg.style.display = 'none';
        UI.mainPlaceholder.style.display = 'flex';
      }
      UI.mainName.textContent = state.name;
      UI.mainDesc.textContent = state.desc;
      UI.nameInput.value = state.name;
      UI.descInput.value = state.desc;
      UI.imgUrlInput.value = state.profile_image_url || '';
    };

    const renderLinks = () => {
      UI.mainLinkList.innerHTML = '';
      state.links.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.className = 'btn invert-hover';
        a.textContent = link.title;
        a.dataset.id = link.id;
        UI.mainLinkList.appendChild(a);
      });

      UI.adminLinkList.innerHTML = '';
      state.links.forEach(link => {
        const item = document.createElement('div');
        item.className = 'admin-link-item';

        const info = document.createElement('div');
        info.className = 'admin-link-info';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'admin-link-title';
        titleDiv.textContent = link.title;

        const urlDiv = document.createElement('div');
        urlDiv.className = 'admin-link-url';
        urlDiv.textContent = link.url;

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'delete-btn';
        delBtn.dataset.id = link.id;
        delBtn.textContent = 'DEL';

        info.appendChild(titleDiv);
        info.appendChild(urlDiv);
        item.appendChild(info);
        item.appendChild(delBtn);
        UI.adminLinkList.appendChild(item);
      });
    };

    const renderAll = () => {
      renderColors();
      renderProfile();
      renderLinks();
    };

    // ===== Event Listeners =====

    const toggleSidebar = (forceClose = false) => {
      if (forceClose || UI.sidebar.classList.contains('open')) {
        UI.sidebar.classList.remove('open');
        UI.overlay.classList.remove('open');
      } else {
        UI.sidebar.classList.add('open');
        UI.overlay.classList.add('open');
      }
    };

    UI.openBtn.addEventListener('click', verifyAndOpenSettings);
    UI.closeBtn.addEventListener('click', () => toggleSidebar(true));
    UI.overlay.addEventListener('click', () => toggleSidebar(true));

    UI.imgUrlInput.addEventListener('input', (e) => {
      state.profile_image_url = e.target.value.trim();
      renderProfile();
      saveState();
    });

    UI.nameInput.addEventListener('input', (e) => {
      state.name = e.target.value;
      UI.mainName.textContent = state.name || ' ';
      saveState();
    });

    UI.descInput.addEventListener('input', (e) => {
      state.desc = e.target.value;
      UI.mainDesc.textContent = state.desc || ' ';
      saveState();
    });

    UI.bgColorPicker.addEventListener('input', (e) => {
      state.bg_color = e.target.value;
      renderColors();
      saveState();
    });

    UI.btnColorPicker.addEventListener('input', (e) => {
      state.btn_color = e.target.value;
      renderColors();
      saveState();
    });

    // DEL 이벤트 위임 (한 번만 등록)
    UI.adminLinkList.addEventListener('click', (e) => {
      const btn = e.target.closest('.delete-btn');
      if (btn) deleteLink(btn.dataset.id);
    });

    UI.addLinkBtn.addEventListener('click', () => {
      const title = UI.newLinkTitle.value.trim();
      let url = UI.newLinkUrl.value.trim();
      if (!title || !url) {
        alert('제목과 URL을 모두 입력해주세요.');
        return;
      }
      if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
      state.links.push({ id: Date.now().toString(), title, url });
      saveState();
      renderLinks();
      UI.newLinkTitle.value = '';
      UI.newLinkUrl.value = '';
    });

    const deleteLink = (id) => {
      state.links = state.links.filter(link => String(link.id) !== String(id));
      saveState();
      renderLinks();
    };

    UI.savePwBtn.addEventListener('click', () => {
      const newPw = UI.pwInput.value.trim();
      if (!newPw) return;
      localStorage.setItem(PW_KEY, hashStr(newPw));
      UI.pwInput.value = '';
      alert('비밀번호가 변경되었습니다.');
    });

    UI.copyLinkBtn.addEventListener('click', () => {
      const encoded = encodeState(state);
      const url = location.origin + location.pathname + '#' + encoded;
      const fallback = () => {
        const el = document.createElement('textarea');
        el.value = url;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      };
      (navigator.clipboard ? navigator.clipboard.writeText(url).catch(fallback) : Promise.resolve(fallback()))
        .then(() => {
          UI.copyLinkBtn.textContent = '복사 완료!';
          setTimeout(() => { UI.copyLinkBtn.textContent = '내 링크 복사'; }, 2000);
        });
    });

    UI.resetBtn.addEventListener('click', () => {
      if (confirm('모든 설정과 링크가 초기 상태로 초기화됩니다. 정말 진행하시겠습니까?')) {
        localStorage.removeItem(DATA_KEY);
        state = JSON.parse(JSON.stringify(defaultState));
        history.replaceState(null, '', location.pathname);
        renderAll();
      }
    });

    // ===== SortableJS =====

    new Sortable(UI.mainLinkList, {
      animation: 150,
      delay: 100,
      delayOnTouchOnly: true,
      ghostClass: 'sortable-ghost',
      onEnd: function () {
        const items = UI.mainLinkList.querySelectorAll('a.btn');
        const newLinksArray = [];
        items.forEach(item => {
          const linkData = state.links.find(l => l.id === item.dataset.id);
          if (linkData) newLinksArray.push(linkData);
        });
        state.links = newLinksArray;
        saveState();
        renderLinks();
      }
    });

    // ===== Init =====
    renderAll();
  </script>
</body>
</html>
